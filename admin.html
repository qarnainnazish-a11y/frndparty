<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Room Monitor</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="firebase-config.js" defer></script>
    <script type="module" src="admin.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🔒 Admin Room Monitor</h1>
        <div class="room-info">
          <input
            type="text"
            id="adminRoomId"
            placeholder="Enter Room ID"
            maxlength="20"
          />
          <button id="adminJoinRoom">Watch Room</button>
        </div>
      </header>

      <div id="adminStatus" style="margin-top:8px;font-size:14px;opacity:0.8;">
        Not watching any room
      </div>

      <div style="margin-top:16px;">
        <h2>Room state</h2>
        <pre
          id="roomStateView"
          style="background:#020617;border:1px solid #1f2937;border-radius:8px;padding:8px;font-size:12px;overflow:auto;max-height:260px;"
        >{}</pre>
      </div>

      <div style="margin-top:16px;">
        <h2>Active rooms (simple)</h2>
        <ul id="roomsList" style="list-style:none;padding:0;margin:0;font-size:14px;"></ul>
      </div>

      <div style="margin-top:16px;">
        <h2>Camera tiles (next phase)</h2>
        <div
          id="cameraGrid"
          style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;"
        ></div>
      </div>
    </div>
  </body>
</html>
