<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Video Sync Room</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Video Sync Room</h1>

      <div class="room-controls">
        <input
          type="text"
          id="roomId"
          placeholder="Enter Room ID"
          value="test143"
        />
        <button id="createRoom">Create Room</button>
        <button id="joinRoom">Join Room</button>
      </div>

      <div id="status">Not connected</div>

      <div class="video-controls">
        <div id="videoContainer"></div>

        <div class="controls-row">
          <button id="prev10">⏮ -10s</button>
          <button id="playPause">▶️ Play</button>
          <button id="next10">⏭ +10s</button>

          <span id="currentTime">0:00</span> /
          <span id="duration">0:00</span>
        </div>

        <!-- NEW: speed control -->
        <div class="controls-row">
          <label for="playbackRate">Speed:</label>
          <select id="playbackRate">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>

        <div class="url-row">
          <input
            type="text"
            id="videoUrl"
            placeholder="Paste YouTube / GDrive / Dropbox / .mp4 link"
            value="https://youtu.be/8aWkhSUlvVE?si=1XI-l_GvusKq-sQw"
          />
          <button id="loadVideo">Load Video</button>
        </div>
      </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
